<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>GovCon Course - Slide Template</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      width: 1920px;
      height: 1080px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      padding: 80px;
    }
    .phase-badge {
      display: inline-block;
      background: #22c55e;
      color: #0f172a;
      padding: 8px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .slide-title {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 40px;
      max-width: 1400px;
    }
    .slide-subtitle {
      font-size: 32px;
      color: #94a3b8;
      line-height: 1.5;
      max-width: 1400px;
    }
    .footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 24px;
      color: #64748b;
    }
    .lesson-number {
      font-weight: 600;
      color: #22c55e;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
    }
    .logo span { color: #22c55e; }
  </style>
</head>
<body>
  <div class="phase-badge">{{PHASE_NAME}} - {{MODULE_TITLE}}</div>
  <h1 class="slide-title">{{SLIDE_TITLE}}</h1>
  <p class="slide-subtitle">{{SLIDE_SUBTITLE}}</p>
  <div class="footer">
    <span class="lesson-number">{{LESSON_ID}}</span>
    <span class="logo">GovCon<span>Giants</span></span>
  </div>
</body>
</html>
