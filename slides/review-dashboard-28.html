hin 48 hours. The relationships you build at events often lead to opportunities that never get posted publicly."}, {"index": 400, "id": "3-3-1-2", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 2, "title": "Types of industry events", "narration": ""}, {"index": 401, "id": "3-3-1-3", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 3, "title": "Finding events (SBA, PTAC, agency calendars)", "narration": ""}, {"index": 402, "id": "3-3-1-4", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 4, "title": "Event selection strategy", "narration": ""}, {"index": 403, "id": "3-3-1-5", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 5, "title": "Pre-event preparation", "narration": ""}, {"index": 404, "id": "3-3-1-6", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 6, "title": "Elevator pitch development", "narration": ""}, {"index": 405, "id": "3-3-1-7", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 7, "title": "Materials to bring (cap statements, cards)", "narration": ""}, {"index": 406, "id": "3-3-1-8", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 8, "title": "Networking at the event", "narration": ""}, {"index": 407, "id": "3-3-1-9", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 9, "title": "Quality over quantity approach", "narration": ""}, {"index": 408, "id": "3-3-1-10", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 10, "title": "Business card and LinkedIn exchange", "narration": ""}, {"index": 409, "id": "3-3-1-11", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 11, "title": "Follow-up within 48 hours", "narration": ""}, {"index": 410, "id": "3-3-1-12", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Industry Events", "slideNum": 12, "title": "Key takeaways", "narration": ""}, {"index": 411, "id": "3-3-2-1", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Site Visits", "slideNum": 1, "title": "Title slide", "narration": "When an agency holds a site visit or industry day at their facility, go. You'll meet the actual people who write and award contracts. You'll see the facility, understand their needs better, and make a memorable impression. Site visits are often required or strongly encouraged for larger opportunities. Treat them as crucial steps\u2014not optional extras."}, {"index": 412, "id": "3-3-2-2", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Site Visits", "slideNum": 2, "title": "Types of site visits (facility tours, pre-award)", "narration": ""}, {"index": 413, "id": "3-3-2-3", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Site Visits", "slideNum": 3, "title": "When site visits are required", "narration": ""}, {"index": 414, "id": "3-3-2-4", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Attend Site Visits", "slideNum": 4, "title": "Preparation for site visits", "narration": ""}, {"index": 415, "id": "3-3-2-5", "phase": "Phase 3: Business Development", "course": "Industry Events & Site Visits", "lesson": "Atte ": 10, "title": "Next steps", "narration": ""}];

    let currentIndex = 0;
    const iframe = document.getElementById('slide-iframe');
    const sidebar = document.getElementById('sidebar');
    const indicator = document.getElementById('slide-indicator');

    function showSlide(index) {
      currentIndex = Math.max(0, Math.min(index, SLIDES.length - 1));
      const slideNum = (currentIndex + 1).toString().padStart(3, '0');
      iframe.src = 'individual/slide-' + slideNum + '.html';
      indicator.textContent = (currentIndex + 1) + ' of ' + SLIDES.length;
      document.querySelectorAll('.slide-link').forEach((el) => {
        el.classList.toggle('active', parseInt(el.dataset.index, 10) === currentIndex);
      });
    }

    function buildSidebar() {
      let lastPhase = '', lastCourse = '';
      SLIDES.forEach((slide, i) => {
        if (slide.phase !== lastPhase) {
          lastPhase = slide.phase;
          const h2 = document.createElement('h2');
          h2.textContent = slide.phase;
          sidebar.appendChild(h2);
        }
        if (slide.course !== lastCourse) {
          lastCourse = slide.course;
          const h3 = document.createElement('h3');
          h3.textContent = slide.course;
          sidebar.appendChild(h3);
        }
        const a = document.createElement('a');
        a.href = '#';
        a.className = 'slide-link' + (i === 0 ? ' active' : '');
        a.dataset.index = i;
        a.textContent = slide.lesson + (slide.slideNum > 1 ? ' · ' + slide.slideNum + '. ' + slide.title : '');
        a.onclick = (e) => { e.preventDefault(); showSlide(i); };
        sidebar.appendChild(a);
      });
    }

    document.getElementById('btn-prev').onclick = () => showSlide(currentIndex - 1);
    document.getElementById('btn-next').onclick = () => showSlide(currentIndex + 1);

    buildSidebar();
    showSlide(0);
  </script>
